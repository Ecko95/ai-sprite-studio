name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.29"
      - run: uv sync --locked --all-groups
      - run: uv run python scripts/sync_upstreams.py --check
      - run: uv run pytest -q
      - run: uv run ruff check .
